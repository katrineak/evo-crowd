name: Poll EVO & update graf

on:
  schedule:
    - cron: '*/5 5-23 * * *'  # Every 5 min, 05:00-23:55 (UTC, gym hours ~06:00-00:00 CET)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  poll-and-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Poll Adamstuen
        run: |
          RESPONSE=$(curl -s -H "Accept: application/json" \
            "https://visits.evofitness.no/api/v1/locations/360e51d3-a434-4697-91c9-f956725108fc/current")
          CURRENT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['current'])")
          MAX_CAP=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['max_capacity'])")
          PCT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['percentageUsed'])")
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')

          if [ ! -f visitor_log.csv ]; then
            echo "timestamp,current,max_capacity,percentageUsed" > visitor_log.csv
          fi
          echo "${TIMESTAMP},${CURRENT},${MAX_CAP},${PCT}" >> visitor_log.csv
          echo "Adamstuen: ${CURRENT}/${MAX_CAP} (${PCT}%)"

      - name: Poll Teisen
        run: |
          RESPONSE=$(curl -s -H "Accept: application/json" \
            "https://visits.evofitness.no/api/v1/locations/eebcd9b8-93f1-4b2d-9ab9-7b064d66ba3c/current")
          CURRENT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['current'])")
          MAX_CAP=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['max_capacity'])")
          PCT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['percentageUsed'])")
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')

          if [ ! -f visitor_log_teisen.csv ]; then
            echo "timestamp,current,max_capacity,percentageUsed" > visitor_log_teisen.csv
          fi
          echo "${TIMESTAMP},${CURRENT},${MAX_CAP},${PCT}" >> visitor_log_teisen.csv
          echo "Teisen: ${CURRENT}/${MAX_CAP} (${PCT}%)"

      - name: Fetch latest timeline data
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, datetime

          locations = {
              "adamstuen": "360e51d3-a434-4697-91c9-f956725108fc",
              "teisen": "eebcd9b8-93f1-4b2d-9ab9-7b064d66ba3c"
          }
          base = "https://visits.evofitness.no/api/v1/locations"
          today = datetime.date.today()

          for name, loc_id in locations.items():
              # Fetch last 14 days + next 7 days of timeline data
              for delta in range(-14, 8):
                  d = today + datetime.timedelta(days=delta)
                  url = f"{base}/{loc_id}/timeline?date={d.isoformat()}"
                  try:
                      req = urllib.request.Request(url, headers={"Accept": "application/json"})
                      with urllib.request.urlopen(req, timeout=10) as resp:
                          data = json.loads(resp.read())
                      fname = f"timeline_{name}_{d.isoformat()}.json"
                      with open(f"/tmp/{fname}", "w") as f:
                          json.dump(data, f)
                  except Exception as e:
                      print(f"  {name} {d}: {e}")
          print("Timeline data fetched")
          PYEOF

      - name: Generate graf.html
        run: python3 generate_graf.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add visitor_log.csv visitor_log_teisen.csv graf.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update visitor data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
